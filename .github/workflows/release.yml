name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write   # required to create a GitHub Release

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest   # produces dist/simple.exe

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up uv
        uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5.4.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Compile UI and resources
        run: uv run build-ui

      - name: Build executable
        run: uv run build-exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a7e09ce9571a2f5c9e6  # v2.2.1
        with:
          files: dist/simple.exe
          fail_on_unmatched_files: true
